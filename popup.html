<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>WOOsdk Wallet</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 380px;
    min-height: 560px;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #eef2f6;
    color: #1e1e2a;
    -webkit-font-smoothing: antialiased;
  }

  .wrapper {
    background: #fff;
    border-radius: 0;
    min-height: 560px;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 18px;
    border-bottom: 2px solid #e2e8f0;
    background: #fff;
  }
  .logo-group { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 34px; height: 34px;
    border: 2px solid #1e1e2a; border-radius: 10px;
    background: #f1f5f9;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo-text h1 { font-size: 16px; font-weight: 900; letter-spacing: -0.5px; }
  .logo-text p  { font-size: 10px; font-weight: 700; color: #5e6c7c; letter-spacing: 2px; text-transform: uppercase; }

  .header-right { display: flex; gap: 8px; }
  .icon-btn {
    width: 34px; height: 34px;
    background: #f8fafc; border: 2px solid #1e1e2a; border-radius: 50%;
    cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 2px 2px 0 #1e1e2a; transition: 0.1s;
  }
  .icon-btn:hover { transform: translate(1px,1px); box-shadow: none; }

  /* ── Balance section ── */
  .balance-section {
    background: #1e1e2a;
    color: #fff;
    padding: 20px 18px;
    text-align: center;
  }
  .addr-chip {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 40px;
    padding: 4px 12px;
    font-size: 12px; font-weight: 700;
    display: inline-block; margin-bottom: 12px;
    cursor: pointer;
  }
  .addr-chip:hover { background: rgba(255,255,255,0.2); }
  .balance-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
  .balance-value { font-size: 38px; font-weight: 900; letter-spacing: -1px; }
  .balance-symbol { font-size: 16px; font-weight: 500; color: rgba(255,255,255,0.7); margin-left: 6px; }

  .quick-actions {
    display: flex; gap: 10px; margin-top: 16px; justify-content: center;
  }
  .quick-btn {
    flex: 1; max-width: 100px;
    background: rgba(255,255,255,0.12);
    border: 1.5px solid rgba(255,255,255,0.3);
    color: #fff;
    border-radius: 40px;
    padding: 10px 0;
    font-size: 13px; font-weight: 700;
    cursor: pointer; transition: 0.1s;
  }
  .quick-btn:hover { background: rgba(255,255,255,0.22); }

  /* ── Nav ── */
  .nav-tabs {
    display: flex;
    border-bottom: 2px solid #e2e8f0;
    background: #fff;
  }
  .nav-btn {
    flex: 1; padding: 10px 0;
    background: none; border: none;
    font-size: 11px; font-weight: 700;
    color: #5e6c7c; cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: 0.15s; display: flex; flex-direction: column; align-items: center; gap: 3px;
  }
  .nav-btn .nav-ico { font-size: 18px; }
  .nav-btn.active { color: #1e1e2a; border-bottom-color: #1e1e2a; }

  /* ── Content ── */
  .content { flex: 1; padding: 16px; overflow-y: auto; }

  /* ── Token list ── */
  .token-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 10px;
    border: 2px solid transparent;
    border-radius: 16px; margin-bottom: 6px;
    cursor: pointer; transition: 0.15s;
  }
  .token-item:hover { background: #f1f5f9; border-color: #cbd5e1; }
  .token-item.selected { border-color: #1e1e2a; background: #f8fafc; }
  .t-left { display: flex; align-items: center; gap: 10px; }
  .t-icon {
    width: 38px; height: 38px; border-radius: 50%;
    border: 2px solid #1e1e2a; background: #f1f5f9;
    display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .t-sym { font-size: 15px; font-weight: 800; color: #1e1e2a; }
  .t-name { font-size: 11px; color: #5e6c7c; }
  .t-right { text-align: right; }
  .t-bal { font-size: 15px; font-weight: 800; color: #1e1e2a; }
  .t-fiat { font-size: 11px; color: #5e6c7c; }

  /* ── Send form ── */
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; font-weight: 700; color: #5e6c7c; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .form-input {
    width: 100%; padding: 14px 16px;
    background: #fff; border: 2px solid #1e1e2a; border-radius: 14px;
    font-size: 14px; color: #1e1e2a; font-family: inherit;
  }
  .form-input:focus { outline: none; box-shadow: 0 0 0 3px rgba(30,30,42,0.1); }

  /* ── Buttons ── */
  .btn-primary {
    width: 100%; padding: 16px;
    background: #1e1e2a; color: #fff;
    border: 3px solid #1e1e2a; border-radius: 50px;
    font-size: 15px; font-weight: 800;
    cursor: pointer; box-shadow: 4px 4px 0 #0f0f15;
    transition: 0.1s;
  }
  .btn-primary:hover { transform: translate(2px,2px); box-shadow: none; }
  .btn-secondary {
    width: 100%; padding: 12px;
    background: #fff; color: #1e1e2a;
    border: 2px solid #1e1e2a; border-radius: 50px;
    font-size: 14px; font-weight: 700;
    cursor: pointer; margin-top: 10px;
    transition: 0.1s;
  }
  .btn-secondary:hover { background: #f1f5f9; }

  /* ── Connected sites ── */
  .site-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px; background: #f8fafc;
    border: 2px solid #e2e8f0; border-radius: 14px; margin-bottom: 8px;
  }
  .site-info { display: flex; flex-direction: column; }
  .site-origin { font-size: 13px; font-weight: 700; color: #1e1e2a; }
  .site-badge { font-size: 10px; font-weight: 700; color: #16a34a; }
  .btn-revoke {
    background: #fff; color: #dc2626;
    border: 2px solid #dc2626; border-radius: 40px;
    padding: 5px 12px; font-size: 12px; font-weight: 700;
    cursor: pointer; transition: 0.1s;
  }
  .btn-revoke:hover { background: #fef2f2; }

  /* ── Status bar ── */
  .status-bar {
    padding: 8px 18px;
    border-top: 2px solid #e2e8f0;
    font-size: 12px; font-weight: 600;
    display: flex; align-items: center; gap: 6px;
  }
  .status-bar.ok      { color: #16a34a; }
  .status-bar.err     { color: #dc2626; }
  .status-bar.loading { color: #1e1e2a; }
  .spinner {
    display: inline-block; width: 10px; height: 10px;
    border: 2px solid #ccc; border-top-color: #1e1e2a;
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Confirm panel ── */
  .confirm-panel {
    background: #fff5f8; border: 2px solid #1e1e2a;
    border-radius: 16px; padding: 14px; margin-top: 14px;
    font-size: 13px; font-weight: 700; color: #1e1e2a;
  }
  .confirm-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .confirm-btns { display: flex; gap: 8px; margin-top: 12px; }
  .confirm-btns button { flex: 1; padding: 10px; border-radius: 40px; font-weight: 700; font-size: 13px; cursor: pointer; }

  .auto-sign-badge {
    background: #dcfce7; border: 1.5px solid #16a34a;
    border-radius: 40px; padding: 4px 12px;
    font-size: 11px; font-weight: 800; color: #15803d;
    display: inline-flex; align-items: center; gap: 6px;
    margin-bottom: 12px;
  }

  .section-title { font-size: 14px; font-weight: 800; margin-bottom: 12px; color: #1e1e2a; }

  /* Settings */
  .settings-section { margin-bottom: 18px; }
  .settings-section label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #5e6c7c; margin-bottom: 6px; }
</style>
</head>
<body>
<div class="wrapper" id="app">
  <div style="padding:40px;text-align:center;color:#5e6c7c">Loading...</div>
</div>

<script type="module" src="/src/popup.js"></script>
</body>
</html>
