<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>WOOsdk — Confirmação</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #eef2f6;
    color: #1e1e2a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .card {
    background: #fff;
    border: 3px solid #1e1e2a;
    border-radius: 28px;
    box-shadow: 8px 8px 0 #1e1e2a;
    padding: 28px 24px 24px;
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-box {
    width: 44px; height: 44px;
    border: 2px solid #1e1e2a;
    border-radius: 12px;
    background: #f1f5f9;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .header-text h1 {
    font-size: 18px; font-weight: 900; letter-spacing: -0.5px;
    color: #1e1e2a;
  }
  .header-text p { font-size: 12px; color: #5e6c7c; font-weight: 600; }

  /* ── Badge de tipo ── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #1e1e2a;
    color: #fff;
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 5px 12px;
    border-radius: 40px;
  }
  .badge.connect     { background: #0066ff; }
  .badge.sign        { background: #7c3aed; }
  .badge.transaction { background: #ea580c; }
  .badge.contract    { background: #059669; }

  /* ── Origin box ── */
  .origin-box {
    background: #f8fafc;
    border: 2px solid #e2e8f0;
    border-radius: 16px;
    padding: 14px 16px;
  }
  .origin-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: #5e6c7c; margin-bottom: 4px;
  }
  .origin-url {
    font-size: 15px; font-weight: 800; color: #1e1e2a;
    word-break: break-all;
  }

  /* ── Address box ── */
  .address-box {
    background: #f1f5f9;
    border: 2px dashed #1e1e2a;
    border-radius: 14px;
    padding: 12px 14px;
    font-size: 13px;
    font-family: monospace;
    color: #1e1e2a;
    word-break: break-all;
    font-weight: 700;
  }
  .address-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: #5e6c7c; margin-bottom: 6px;
  }

  /* ── Info rows ── */
  .info-section {
    display: flex; flex-direction: column; gap: 10px;
  }
  .info-row {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 10px 14px;
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
  }
  .info-key { font-size: 12px; font-weight: 700; color: #5e6c7c; }
  .info-val { font-size: 13px; font-weight: 800; color: #1e1e2a; text-align: right; max-width: 60%; word-break: break-all; }

  /* ── Mensagem / dados ── */
  .data-box {
    background: #f4f3ec;
    border: 2px solid #1e1e2a;
    border-radius: 14px;
    padding: 14px;
    font-size: 13px;
    font-family: monospace;
    color: #1e1e2a;
    max-height: 120px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }

  /* ── Permissions list ── */
  .perm-list { display: flex; flex-direction: column; gap: 8px; }
  .perm-item {
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; font-weight: 600; color: #1e1e2a;
  }
  .perm-icon {
    width: 28px; height: 28px;
    background: #e0f2fe;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  /* ── Warning ── */
  .warning {
    background: #fef9c3;
    border: 2px solid #ca8a04;
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 12px;
    font-weight: 600;
    color: #713f12;
    display: flex; gap: 8px; align-items: flex-start;
  }

  /* ── Auto-sign pill ── */
  .autosign-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: #dcfce7;
    border: 1.5px solid #16a34a;
    border-radius: 40px;
    padding: 4px 12px;
    font-size: 11px; font-weight: 800;
    color: #15803d;
    align-self: flex-start;
  }

  /* ── Botões ── */
  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .btn {
    padding: 16px;
    border-radius: 50px;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    transition: 0.1s;
    border: 3px solid #1e1e2a;
  }
  .btn-reject {
    background: #fff;
    color: #1e1e2a;
    box-shadow: 4px 4px 0 #1e1e2a;
  }
  .btn-reject:hover { transform: translate(2px,2px); box-shadow: none; }

  .btn-approve {
    background: #1e1e2a;
    color: #fff;
    box-shadow: 4px 4px 0 #0f0f15;
  }
  .btn-approve.connect     { background: #0066ff; border-color: #0066ff; box-shadow: 4px 4px 0 #003db3; }
  .btn-approve.sign        { background: #7c3aed; border-color: #7c3aed; box-shadow: 4px 4px 0 #4c1d95; }
  .btn-approve.transaction { background: #ea580c; border-color: #ea580c; box-shadow: 4px 4px 0 #9a3412; }
  .btn-approve.contract    { background: #059669; border-color: #059669; box-shadow: 4px 4px 0 #065f46; }
  .btn-approve:hover { transform: translate(2px,2px); box-shadow: none !important; }

  .status { font-size: 13px; font-weight: 700; color: #5e6c7c; text-align: center; }
  .status.loading { color: #1e1e2a; }
  .status.err     { color: #dc2626; }
  .status.ok      { color: #16a34a; }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid #ccc;
    border-top-color: #1e1e2a;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card" id="card">
  </div>

<script type="module" src="/src/confirm.js"></script>
</body>
</html>
